<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOVE! – Find Your Place</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MOVE!">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Plus Jakarta Sans',sans-serif; }

:root {
  --navy:    #0a1628;
  --navy2:   #0f2040;
  --teal:    #0891b2;
  --teal2:   #06b6d4;
  --mint:    #10d9a0;
  --mint2:   #34eca6;
  --white:   #ffffff;
  --offwhite:#f0f7ff;
  --muted:   #94a3b8;
  --border:  #1e3a5f;
  --glass:   rgba(10,22,40,0.82);
  --sale:    #0891b2;
  --rent:    #10d9a0;
  --sstc:    #64748b;
}

#app { display:flex; flex-direction:column; height:100dvh; background:var(--navy); }

/* ── HEADER ── */
header {
  background:var(--navy);
  padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; z-index:1000;
  border-bottom:1px solid var(--border);
  position:relative;
}

header::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--teal), var(--mint), transparent);
}

.logo {
  font-family:'Cabinet Grotesk',sans-serif;
  font-weight:900; font-size:1.7rem;
  letter-spacing:-0.05em; line-height:1;
  background:linear-gradient(135deg, var(--teal2), var(--mint2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.header-right { display:flex; gap:8px; align-items:center; }

.btn-locate {
  background:linear-gradient(135deg, var(--teal), var(--mint));
  color:var(--navy); border:none; border-radius:50px;
  padding:8px 16px; font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700; font-size:0.78rem; cursor:pointer;
  display:flex; align-items:center; gap:6px;
  box-shadow:0 0 20px rgba(8,145,178,0.4);
  transition:all 0.2s;
}
.btn-locate:active { transform:scale(0.96); box-shadow:none; }

/* ── FILTERS ── */
.filters {
  background:var(--navy2);
  padding:9px 12px;
  display:flex; gap:6px; overflow-x:auto; flex-shrink:0;
  scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.filters::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink:0; white-space:nowrap;
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:50px; padding:5px 13px;
  font-size:0.73rem; font-weight:600; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all 0.15s; letter-spacing:0.01em;
}
.chip.on {
  background:linear-gradient(135deg, var(--teal), var(--mint));
  color:var(--navy); border-color:transparent;
  box-shadow:0 0 12px rgba(8,145,178,0.3);
}
.chip.sale-on { background:var(--teal); color:white; border-color:transparent; }
.chip.rent-on { background:var(--mint); color:var(--navy); border-color:transparent; }

/* ── MAP ── */
#map-wrap { flex:1; position:relative; overflow:hidden; }
#map { width:100%; height:100%; }

/* ── MAP CONTROLS ── */
.map-ctrl-left {
  position:absolute; top:12px; left:12px; z-index:500;
  display:flex; flex-direction:column; gap:6px;
}

.ctrl-pill {
  background:var(--glass); border:1px solid var(--border);
  color:var(--muted); border-radius:50px;
  padding:8px 14px; cursor:pointer;
  display:flex; align-items:center; gap:7px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.72rem; font-weight:600;
  backdrop-filter:blur(12px);
  transition:all 0.2s; white-space:nowrap;
  letter-spacing:0.01em;
}
.ctrl-pill .indicator {
  width:8px; height:8px; border-radius:50%;
  background:var(--border); transition:background 0.2s; flex-shrink:0;
}
.ctrl-pill.on {
  background:rgba(16,217,160,0.15);
  border-color:var(--mint);
  color:var(--mint);
}
.ctrl-pill.on .indicator { background:var(--mint); box-shadow:0 0 6px var(--mint); }

/* ── LAYER SWITCHER ── */
.layers {
  position:absolute; top:12px; right:12px; z-index:500;
  display:flex; flex-direction:column; gap:6px;
}
.lbtn {
  background:var(--glass); border:1px solid var(--border);
  color:var(--muted); width:50px; height:50px; border-radius:12px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  font-size:0.58rem; font-weight:600; text-transform:uppercase;
  letter-spacing:0.04em; backdrop-filter:blur(12px);
  font-family:'Plus Jakarta Sans',sans-serif; transition:all 0.15s;
}
.lbtn .li { font-size:1.1rem; line-height:1; }
.lbtn.on {
  background:rgba(8,145,178,0.2);
  border-color:var(--teal);
  color:var(--teal2);
}

/* ── STATUS BAR ── */
.status-bar {
  position:absolute; bottom:80px; left:50%;
  transform:translateX(-50%);
  background:var(--glass); color:var(--white);
  padding:7px 18px; border-radius:50px;
  font-size:0.73rem; font-weight:600; z-index:400;
  pointer-events:none; backdrop-filter:blur(12px);
  border:1px solid var(--border); white-space:nowrap;
  letter-spacing:0.01em;
}

.layer-badge {
  position:absolute; bottom:80px; right:12px;
  background:var(--glass); color:var(--muted);
  padding:5px 12px; border-radius:50px;
  font-size:0.68rem; font-weight:500; z-index:400;
  pointer-events:none; backdrop-filter:blur(12px);
  border:1px solid var(--border);
}

/* ── PROPERTY PINS ── */
.pin {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 10px; border-radius:8px;
  font-family:'Cabinet Grotesk',sans-serif; font-weight:700;
  font-size:0.75rem; white-space:nowrap;
  cursor:pointer; user-select:none;
  position:relative; transition:transform 0.1s;
  box-shadow:0 2px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
}
.pin::after {
  content:''; position:absolute;
  bottom:-6px; left:50%; transform:translateX(-50%);
  border-left:5px solid transparent; border-right:5px solid transparent;
}
.pin:active { transform:scale(0.95); }

.pin.sale {
  background:var(--navy);
  border:1.5px solid var(--teal);
  color:var(--teal2);
}
.pin.sale::after { border-top:6px solid var(--navy); }

.pin.rent {
  background:rgba(16,217,160,0.15);
  border:1.5px solid var(--mint);
  color:var(--mint2);
}
.pin.rent::after { border-top:6px solid rgba(16,217,160,0.15); }

.pin.sstc {
  background:rgba(100,116,139,0.2);
  border:1.5px solid var(--sstc);
  color:var(--muted); opacity:0.7;
}
.pin.sstc::after { border-top:6px solid rgba(100,116,139,0.2); }

/* ── LOADING ── */
.loading-pill {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(16,217,160,0.12); border:1px solid var(--mint);
  color:var(--mint); border-radius:50px;
  padding:6px 16px; font-size:0.72rem; font-weight:600;
  display:none; backdrop-filter:blur(12px); z-index:600;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── PANEL OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(10,22,40,0.7); z-index:800;
  backdrop-filter:blur(4px);
}
.overlay.on { display:block; }

/* ── PROPERTY PANEL ── */
.panel {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--navy2);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  z-index:900; transform:translateY(100%);
  transition:transform 0.36s cubic-bezier(0.32,0.72,0,1);
  max-height:88dvh; overflow-y:auto;
}
.panel.on { transform:translateY(0); }

.panel-handle {
  width:36px; height:4px; border-radius:2px;
  background:var(--border); margin:14px auto 0;
}

.panel-hero {
  width:100%; height:190px; margin-top:14px;
  position:relative; overflow:hidden;
}
.panel-hero img {
  width:100%; height:100%; object-fit:cover; display:block;
  filter:brightness(0.85);
}
.panel-hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, var(--navy2) 0%, transparent 60%);
}

.panel-body { padding:16px 18px 40px; }

.panel-tag {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:50px;
  font-size:0.68rem; font-weight:700;
  text-transform:uppercase; letter-spacing:0.08em;
  margin-bottom:10px;
}
.tag-sale { background:rgba(8,145,178,0.15); color:var(--teal2); border:1px solid var(--teal); }
.tag-rent { background:rgba(16,217,160,0.12); color:var(--mint2); border:1px solid var(--mint); }
.tag-sstc { background:rgba(100,116,139,0.15); color:var(--muted); border:1px solid var(--sstc); }

.panel-price {
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:2.1rem; font-weight:900;
  line-height:1; margin-bottom:5px;
  background:linear-gradient(135deg, var(--white), var(--teal2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.panel-addr { color:var(--muted); font-size:0.85rem; margin-bottom:16px; font-weight:500; }

.panel-stats {
  display:flex; gap:0;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:14px; overflow:hidden;
  margin-bottom:14px;
}
.stat {
  flex:1; padding:12px 10px; text-align:center;
  border-right:1px solid var(--border);
}
.stat:last-child { border-right:none; }
.stat-val {
  font-family:'Cabinet Grotesk',sans-serif;
  font-weight:800; font-size:1rem;
  color:var(--white); display:block; line-height:1.2;
}
.stat-lbl { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }

/* Intelligence card */
.intel-card {
  background:linear-gradient(135deg, rgba(8,145,178,0.08), rgba(16,217,160,0.06));
  border:1px solid rgba(8,145,178,0.25);
  border-radius:14px; padding:14px 16px; margin-bottom:14px;
}
.intel-title {
  font-size:0.65rem; color:var(--teal2);
  text-transform:uppercase; letter-spacing:0.1em;
  font-weight:700; margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.intel-title::before { content:'✦'; font-size:0.7rem; }
.intel-vals { display:flex; gap:16px; flex-wrap:wrap; }
.intel-val strong { font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:1rem; color:var(--white); display:block; }
.intel-val span { font-size:0.67rem; color:var(--muted); }

.panel-desc { font-size:0.85rem; line-height:1.7; color:var(--muted); margin-bottom:18px; }

.panel-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.btn-primary {
  background:linear-gradient(135deg, var(--teal), var(--mint));
  color:var(--navy); border:none; padding:14px;
  border-radius:12px; font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700; font-size:0.87rem; cursor:pointer;
  box-shadow:0 4px 16px rgba(8,145,178,0.3);
  transition:all 0.15s;
}
.btn-primary:active { transform:scale(0.97); box-shadow:none; }

.btn-secondary {
  background:transparent; color:var(--teal2);
  border:1.5px solid var(--teal); padding:14px;
  border-radius:12px; font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700; font-size:0.87rem; cursor:pointer;
  transition:all 0.15s;
}
.btn-secondary:active { background:rgba(8,145,178,0.1); }

.panel-close {
  position:absolute; top:20px; right:16px;
  width:30px; height:30px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--border);
  color:var(--muted); border-radius:50%;
  font-size:0.82rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.panel-close:active { background:rgba(255,255,255,0.15); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--glass); border-top:1px solid var(--border);
  backdrop-filter:blur(16px);
  display:flex; z-index:400; padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; padding:10px 0; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.62rem; font-weight:600;
  color:var(--muted); text-transform:uppercase;
  letter-spacing:0.04em; border:none; background:transparent;
  transition:color 0.15s;
}
.nav-btn .nav-icon { font-size:1.2rem; line-height:1; }
.nav-btn.on { color:var(--teal2); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:72px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--navy2); color:var(--white);
  padding:10px 18px; border-radius:50px;
  font-size:0.8rem; font-weight:600; z-index:9999;
  transition:transform 0.3s ease; white-space:nowrap;
  pointer-events:none;
  border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.toast.on { transform:translateX(-50%) translateY(0); }

/* Leaflet overrides */
.leaflet-control-zoom { display:none; }
.leaflet-control-attribution { font-size:9px; opacity:0.3; background:transparent; color:var(--muted); }
.leaflet-tile-pane { filter:hue-rotate(180deg) invert(1) brightness(0.9) contrast(1.1); }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">MOVE!</div>
  <div class="header-right">
    <button class="btn-locate" onclick="locateMe()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      Near Me
    </button>
  </div>
</header>

<div class="filters" id="filters">
  <div class="chip on"  onclick="setFilter(this,'all')">All</div>
  <div class="chip" onclick="setFilter(this,'sale')">For Sale</div>
  <div class="chip" onclick="setFilter(this,'rent')">To Rent</div>
  <div class="chip" onclick="setFilter(this,'under500k')">Under £500k</div>
  <div class="chip" onclick="setFilter(this,'500kto1m')">£500k – £1m</div>
  <div class="chip" onclick="setFilter(this,'over1m')">Over £1m</div>
  <div class="chip" onclick="setFilter(this,'2bed')">2 Beds</div>
  <div class="chip" onclick="setFilter(this,'3bed')">3 Beds</div>
  <div class="chip" onclick="setFilter(this,'4bed')">4+ Beds</div>
</div>

<div id="map-wrap">
  <div id="map"></div>

  <div class="map-ctrl-left">
    <div class="ctrl-pill" id="boundaryBtn" onclick="toggleBoundaries()">
      <div class="indicator"></div> Land Boundaries
    </div>
  </div>

  <div class="loading-pill" id="loadingPill">⟳ Loading…</div>

  <div class="layers">
    <button class="lbtn on" id="btn-street" onclick="setLayer('street')"><span class="li">🗺️</span>Map</button>
    <button class="lbtn" id="btn-satellite" onclick="setLayer('satellite')"><span class="li">🛰️</span>Sat</button>
    <button class="lbtn" id="btn-topo" onclick="setLayer('topo')"><span class="li">🏔️</span>Topo</button>
    <button class="lbtn" id="btn-light" onclick="setLayer('light')"><span class="li">✨</span>Light</button>
  </div>

  <div class="status-bar" id="statusBar">Searching for properties…</div>
  <div class="layer-badge" id="layerBadge">🗺️ Map</div>

  <!-- Bottom nav sits over map -->
  <div class="bottom-nav">
    <button class="nav-btn on" onclick="navClick(this,'map')">
      <span class="nav-icon">🗺️</span>Map
    </button>
    <button class="nav-btn" onclick="navClick(this,'search')">
      <span class="nav-icon">🔍</span>Search
    </button>
    <button class="nav-btn" onclick="navClick(this,'saved')">
      <span class="nav-icon">♡</span>Saved
    </button>
    <button class="nav-btn" onclick="navClick(this,'alerts')">
      <span class="nav-icon">🔔</span>Alerts
    </button>
  </div>
</div>

</div>

<!-- Panel -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-hero" id="panelHero">
    <img id="panelImg" src="" alt="">
    <div class="panel-hero-overlay"></div>
  </div>
  <div class="panel-body">
    <div class="panel-tag" id="pTag"></div>
    <div class="panel-price" id="pPrice"></div>
    <div class="panel-addr" id="pAddr"></div>
    <div class="panel-stats">
      <div class="stat"><span class="stat-val" id="sBeds">–</span><div class="stat-lbl">Beds</div></div>
      <div class="stat"><span class="stat-val" id="sType">–</span><div class="stat-lbl">Type</div></div>
      <div class="stat"><span class="stat-val" id="sPortal">–</span><div class="stat-lbl">Portal</div></div>
      <div class="stat"><span class="stat-val" id="sDist">–</span><div class="stat-lbl">Distance</div></div>
    </div>
    <div class="intel-card">
      <div class="intel-title">Property Intelligence</div>
      <div class="intel-vals" id="intelVals">
        <div class="intel-val"><strong style="color:var(--muted)">Loading…</strong><span>Est. value</span></div>
      </div>
    </div>
    <div class="panel-desc" id="pDesc"></div>
    <div class="panel-btns">
      <button class="btn-primary" id="portalBtn" onclick="viewOnPortal()">View Listing</button>
      <button class="btn-secondary" onclick="bookViewing()">Book Viewing</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OS_KEY = 'Gl3G1DJQe2HyDXs5zpLrHEMBfZTlsR4A';

// ── TILE LAYERS ────────────────────────────────────────────────────────
// Dark/inverted OSM for the navy theme
const tileDefs = {
  street:    { url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',     opts:{maxZoom:20}, label:'🗺️ Map', invert:true },
  satellite: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', opts:{maxZoom:20}, label:'🛰️ Satellite', invert:false },
  topo:      { url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',       opts:{maxZoom:17}, label:'🏔️ Topo', invert:true },
  light:     { url:'https://api.os.uk/maps/raster/v1/zxy/Light_3857/{z}/{x}/{y}.png?key='+OS_KEY, opts:{maxZoom:18}, label:'✨ OS Light', invert:false },
};

const map = L.map('map', {
  center:[51.510,-0.085], zoom:13,
  zoomControl:false, attributionControl:true, maxZoom:20,
});

let currentTile = L.tileLayer(tileDefs.street.url, tileDefs.street.opts).addTo(map);
document.querySelector('.leaflet-tile-pane').style.filter = 'hue-rotate(180deg) invert(1) brightness(0.85) contrast(1.1) saturate(0.9)';

function setLayer(key) {
  map.removeLayer(currentTile);
  currentTile = L.tileLayer(tileDefs[key].url, tileDefs[key].opts).addTo(map);
  // Apply dark filter to non-satellite layers
  const pane = document.querySelector('.leaflet-tile-pane');
  pane.style.filter = tileDefs[key].invert
    ? 'hue-rotate(180deg) invert(1) brightness(0.85) contrast(1.1) saturate(0.9)'
    : 'brightness(0.9)';
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('btn-' + key).classList.add('on');
  document.getElementById('layerBadge').textContent = tileDefs[key].label;
}

// ── STATE ──────────────────────────────────────────────────────────────
let allListings = [];
let markers = [];
let activeFilter = 'all';
let currentProp = null;
let boundariesOn = false;
let boundaryGroup = L.layerGroup().addTo(map);
let loadTimer = null;
let userMarker = null;

// ── MARKERS ────────────────────────────────────────────────────────────
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function renderMarkers() {
  clearMarkers();
  const filtered = filterListings(allListings, activeFilter);

  filtered.forEach(p => {
    const isRent = p.status === 'rent';
    const cls = p.sstc ? 'sstc' : isRent ? 'rent' : 'sale';
    const label = p.priceLabel + (isRent && !p.sstc ? '/mo' : '') + (p.sstc ? ' SSTC' : '');

    const icon = L.divIcon({
      className: '',
      html: `<div class="pin ${cls}">${label}</div>`,
      iconSize: [1,1],
      iconAnchor: [0,28],
    });

    const m = L.marker([p.lat, p.lng], { icon })
      .addTo(map)
      .on('click', () => openPanel(p));
    markers.push(m);
  });

  document.getElementById('statusBar').textContent =
    `${filtered.length} propert${filtered.length===1?'y':'ies'} found`;
}

function filterListings(list, filter) {
  return list.filter(p => {
    if (filter === 'all') return true;
    if (filter === 'sale') return p.status === 'sale' && !p.sstc;
    if (filter === 'rent') return p.status === 'rent';
    if (filter === 'under500k') return p.price < 500000;
    if (filter === '500kto1m') return p.price >= 500000 && p.price <= 1000000;
    if (filter === 'over1m') return p.price > 1000000;
    if (filter === '2bed') return p.bedrooms === 2;
    if (filter === '3bed') return p.bedrooms === 3;
    if (filter === '4bed') return p.bedrooms >= 4;
    return true;
  });
}

// ── LOAD LISTINGS ──────────────────────────────────────────────────────
async function loadListings() {
  const c = map.getCenter();
  showLoading('Finding properties…');

  try {
    const [saleRes, rentRes] = await Promise.all([
      fetch(`/api/listings?lat=${c.lat.toFixed(5)}&lng=${c.lng.toFixed(5)}&status=sale&radius=1`),
      fetch(`/api/listings?lat=${c.lat.toFixed(5)}&lng=${c.lng.toFixed(5)}&status=rent&radius=1`),
    ]);
    const sale = await saleRes.json();
    const rent = await rentRes.json();

    allListings = [
      ...(sale.listings || []),
      ...(rent.warning ? [] : rent.listings || []),
    ];

    hideLoading();
    renderMarkers();

    if (allListings.length > 0) {
      showToast(`✅ ${allListings.length} properties near you`);
    } else {
      showToast('No properties here — try zooming out');
      document.getElementById('statusBar').textContent = 'No properties in this area';
    }
  } catch(err) {
    hideLoading();
    showToast('⚠️ ' + err.message);
  }
}

map.on('moveend', () => {
  clearTimeout(loadTimer);
  loadTimer = setTimeout(loadListings, 900);
});

setTimeout(loadListings, 500);

// ── FILTERS ────────────────────────────────────────────────────────────
function setFilter(el, val) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeFilter = val;
  renderMarkers();
}

// ── LOCATE ─────────────────────────────────────────────────────────────
function locateMe() {
  showToast('📍 Finding your location…');
  if (!navigator.geolocation) { showToast('⚠️ Location not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude:lat, longitude:lng } = pos.coords;
      map.setView([lat, lng], 15);
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([lat, lng], {
        radius:10, fillColor:'#0891b2', color:'#fff', weight:3, fillOpacity:0.95,
      }).addTo(map).bindTooltip('You are here');
      showToast('✅ Showing properties near you');
    },
    err => {
      const msgs = {1:'Permission denied — allow location in browser settings',2:'Position unavailable',3:'Timed out'};
      showToast('⚠️ ' + (msgs[err.code]||err.message));
    },
    { enableHighAccuracy:false, timeout:15000, maximumAge:60000 }
  );
}

// ── BOUNDARIES ─────────────────────────────────────────────────────────
async function toggleBoundaries() {
  boundariesOn = !boundariesOn;
  document.getElementById('boundaryBtn').classList.toggle('on', boundariesOn);
  if (!boundariesOn) { boundaryGroup.clearLayers(); showToast('Boundaries hidden'); return; }
  loadBoundaries();
}

async function loadBoundaries() {
  const b = map.getBounds(), pad = 0.005;
  const bbox = [b.getWest()-pad, b.getSouth()-pad, b.getEast()+pad, b.getNorth()+pad].join(',');
  showLoading('Loading boundaries…');
  try {
    const res = await fetch(`/api/inspire?bbox=${bbox}`);
    const geo = await res.json();
    boundaryGroup.clearLayers();
    if (geo.features?.length > 0) {
      L.geoJSON(geo, {
        style: f => ({
          color: f.properties?.building ? '#0891b2' : '#10d9a0',
          fillColor: f.properties?.building ? '#0891b2' : '#10d9a0',
          fillOpacity: 0.12, weight: 1.5,
        }),
        onEachFeature: (f, l) => {
          const area = calcArea(f.geometry);
          if (area > 0) l.bindTooltip(`~${area.toLocaleString()} m²`, { sticky:true });
        }
      }).addTo(boundaryGroup);
      showToast(`✅ ${geo.features.length} boundaries loaded`);
    } else {
      showToast('No boundary data here');
    }
  } catch(e) { showToast('⚠️ Boundary load failed'); }
  hideLoading();
}

map.on('moveend', () => { if (boundariesOn) loadBoundaries(); });

function calcArea(geom) {
  try {
    const coords = geom.coordinates[0];
    const R = 6371000; let area = 0;
    for (let i = 0; i < coords.length-1; i++) {
      const [lo1,la1]=coords[i],[lo2,la2]=coords[i+1];
      const x1=lo1*Math.PI/180*R*Math.cos(la1*Math.PI/180), y1=la1*Math.PI/180*R;
      const x2=lo2*Math.PI/180*R*Math.cos(la2*Math.PI/180), y2=la2*Math.PI/180*R;
      area += (x1*y2 - x2*y1);
    }
    return Math.round(Math.abs(area/2));
  } catch { return 0; }
}

// ── PANEL ──────────────────────────────────────────────────────────────
const typeImgs = {
  'flat':                 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=700&q=80',
  'terraced-house':       'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=700&q=80',
  'semi-detached-house':  'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=700&q=80',
  'detached-house':       'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=700&q=80',
  'bungalow':             'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=700&q=80',
  'land':                 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=700&q=80',
};

function openPanel(p) {
  currentProp = p;
  const isRent = p.status === 'rent';

  // Hero image
  const img = typeImgs[p.propertyType] || 'https://images.unsplash.com/photo-1549517045-bc93de199b46?w=700&q=80';
  document.getElementById('panelImg').src = img;

  // Tag
  const tagEl = document.getElementById('pTag');
  tagEl.textContent = p.sstc ? 'SSTC' : isRent ? 'To Rent' : 'For Sale';
  tagEl.className = 'panel-tag ' + (p.sstc ? 'tag-sstc' : isRent ? 'tag-rent' : 'tag-sale');

  // Price — rent shows /month, sale shows nothing extra
  document.getElementById('pPrice').textContent = p.priceLabel + (isRent && !p.sstc ? ' / month' : '');
  document.getElementById('pAddr').textContent = p.address || 'Tap "View Listing" for full address';

  // Stats
  document.getElementById('sBeds').textContent = p.bedrooms || '?';
  document.getElementById('sType').textContent = (p.propertyType||'?').replace(/-/g,' ');
  document.getElementById('sPortal').textContent = (p.portal||'?').replace('.co.uk','').replace('.com','');
  document.getElementById('sDist').textContent = p.distance ? p.distance + ' mi' : '?';

  // Description
  const portalName = (p.portal||'rightmove.co.uk').replace('.co.uk','').replace('.com','');
  const typeName = (p.propertyType||'property').replace(/-/g,' ');
  document.getElementById('pDesc').textContent =
    `This ${typeName} is listed ${isRent ? 'to rent at ' + p.priceLabel + ' per month' : 'for sale at ' + p.priceLabel}. Tap "View Listing" to see photos, floor plan and contact the agent on ${portalName}.`;

  // Portal button
  const pName = portalName.charAt(0).toUpperCase() + portalName.slice(1);
  document.getElementById('portalBtn').textContent = `View on ${pName}`;

  // Reset intel
  document.getElementById('intelVals').innerHTML =
    `<div class="intel-val"><strong style="color:var(--muted)">Loading…</strong><span>Est. value</span></div>`;

  // Fetch valuation in background
  fetch(`/api/property?lat=${p.lat}&lng=${p.lng}`)
    .then(r => r.json())
    .then(d => {
      const v = d.valuation;
      const est = v?.estimate ? '£' + Math.round(v.estimate/1000) + 'k' : '?';
      const lo = v?.estimate_range ? '£' + Math.round(v.estimate_range[0]/1000) + 'k' : null;
      const hi = v?.estimate_range ? '£' + Math.round(v.estimate_range[1]/1000) + 'k' : null;
      let html = `<div class="intel-val"><strong>${est}</strong><span>Est. value</span></div>`;
      if (lo && hi) html += `<div class="intel-val"><strong>${lo}–${hi}</strong><span>Value range</span></div>`;
      if (d.recentSales?.length > 0) {
        d.recentSales.slice(0,2).forEach(s => {
          html += `<div class="intel-val"><strong>£${parseInt(s.price||0).toLocaleString()}</strong><span>${s.date||''} sold</span></div>`;
        });
      }
      document.getElementById('intelVals').innerHTML = html;
    })
    .catch(() => {
      document.getElementById('intelVals').innerHTML =
        `<div class="intel-val"><strong>?</strong><span>Est. value</span></div>`;
    });

  map.setView([p.lat, p.lng], Math.max(map.getZoom(), 16));
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}

function closePanel() {
  document.getElementById('panel').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  currentProp = null;
}

function viewOnPortal() {
  if (!currentProp?.url) { showToast('No portal link available'); return; }
  window.open(currentProp.url, '_blank');
  closePanel();
}

function bookViewing() {
  showToast('📅 Viewing requests coming soon');
  closePanel();
}

function navClick(el, tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  if (tab !== 'map') showToast('🔜 ' + tab.charAt(0).toUpperCase() + tab.slice(1) + ' coming soon');
}

// ── HELPERS ────────────────────────────────────────────────────────────
function showLoading(msg) {
  const el = document.getElementById('loadingPill');
  el.textContent = '⟳ ' + msg;
  el.style.display = 'block';
}
function hideLoading() {
  document.getElementById('loadingPill').style.display = 'none';
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  toastTimer = setTimeout(() => t.classList.remove('on'), 3200);
}
</script>
